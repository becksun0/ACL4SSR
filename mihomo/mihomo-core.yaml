  - {name: 🇺🇲 美国节点, type: url-test, include-all: true, tolerance: 50, interval: 180, filter: "(?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States"}

